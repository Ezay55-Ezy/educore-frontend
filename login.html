<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCore — Student Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060910;
    --surface: #0d1117;
    --surface2: #161b22;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --glow: rgba(59,130,246,0.25);
    --green: #10b981;
    --red: #ef4444;
    --ink: #f0f6ff;
    --ink-soft: #8b9bb4;
    --ink-muted: #4a5568;
    --border: rgba(255,255,255,0.07);
    --radius: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── ANIMATED BACKGROUND ── */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
  }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: float 8s ease-in-out infinite;
  }

  .orb1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 70%);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }

  .orb2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(6,182,212,0.10), transparent 70%);
    bottom: -80px; right: -80px;
    animation-delay: -4s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 20px); }
  }

  /* ── LOGIN CARD ── */
  .login-wrapper {
    width: 100%;
    max-width: 460px;
    padding: 24px;
    position: relative;
    z-index: 10;
  }

  .school-badge {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    justify-content: center;
  }

  .badge-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: grid;
    place-items: center;
    font-size: 22px;
    box-shadow: 0 0 20px var(--glow);
  }

  .badge-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #8b9bb4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    box-shadow:
      0 0 0 1px rgba(59,130,246,0.05),
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.05);
    animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header { margin-bottom: 32px; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1.2;
  }

  .card-subtitle {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 8px;
    font-weight: 300;
    line-height: 1.5;
  }

  /* ── FORM ── */
  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--ink-muted);
    pointer-events: none;
    transition: color 0.2s;
  }

  .input-wrap:focus-within .input-icon { color: var(--accent); }

  input {
    width: 100%;
    padding: 14px 16px 14px 46px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 400;
    outline: none;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  input::placeholder { color: var(--ink-muted); font-weight: 300; }

  input:focus {
    border-color: var(--accent);
    background: #0d1520;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
  }

  input.error { border-color: var(--red); box-shadow: 0 0 0 4px rgba(239,68,68,0.10); }

  .toggle-pass {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-muted);
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }

  .toggle-pass:hover { color: var(--ink-soft); }

  /* ── ERROR MESSAGE ── */
  .error-banner {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: #fca5a5;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 8px;
    animation: shake 0.4s ease;
  }

  .error-banner.show { display: flex; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  /* ── SUBMIT BUTTON ── */
  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
    letter-spacing: 0.03em;
    box-shadow: 0 4px 20px var(--glow);
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px var(--glow);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .btn-login .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hint {
    text-align: center;
    margin-top: 24px;
    font-size: 12.5px;
    color: var(--ink-muted);
    line-height: 1.6;
  }

  .hint strong { color: var(--ink-soft); font-weight: 500; }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span { font-size: 11px; color: var(--ink-muted); white-space: nowrap; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="login-wrapper">
  <div class="school-badge">
    <div class="badge-icon">🎓</div>
    <div class="badge-text">EduCore</div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Student Portal</div>
      <div class="card-subtitle">Sign in with your admission number to access your academic dashboard.</div>
    </div>

    <div class="error-banner" id="errorBanner">
      <span>⚠️</span>
      <span id="errorMsg">Invalid credentials. Please try again.</span>
    </div>

    <div class="form-group">
      <label>Admission Number</label>
      <div class="input-wrap">
        <span class="input-icon">🪪</span>
        <input
          type="text"
          id="admissionNo"
          placeholder="e.g. ADM-2024-001"
          autocomplete="username"
          oninput="clearError()"
        >
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          oninput="clearError()"
          onkeydown="if(event.key==='Enter') login()"
        >
        <button class="toggle-pass" onclick="togglePassword()" type="button" id="toggleBtn">👁</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">
      <span class="btn-text">Sign In →</span>
      <div class="spinner"></div>
    </button>

    <div class="divider"><span>test credentials</span></div>

    <div class="hint">
      <strong>ADM-2024-001</strong> / password123 &nbsp;·&nbsp;
      <strong>ADM-2024-002</strong> / password123<br>
      <span style="margin-top:4px;display:block;">Default password is your admission number</span>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:5000/api';

  function togglePassword() {
    const input = document.getElementById('password');
    const btn   = document.getElementById('toggleBtn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  function clearError() {
    document.getElementById('errorBanner').classList.remove('show');
    document.getElementById('admissionNo').classList.remove('error');
    document.getElementById('password').classList.remove('error');
  }

  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorBanner').classList.add('show');
    document.getElementById('admissionNo').classList.add('error');
    document.getElementById('password').classList.add('error');
  }

  async function login() {
    const admissionNo = document.getElementById('admissionNo').value.trim();
    const password    = document.getElementById('password').value;
    const btn         = document.getElementById('loginBtn');

    // Validate
    if (!admissionNo) { showError('Please enter your admission number.'); return; }
    if (!password)    { showError('Please enter your password.'); return; }

    // Show loading
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const response = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admission_no: admissionNo, password })
      });

      const data = await response.json();

      if (data.success) {
        // Save token and user info
        localStorage.setItem('educore_token', data.token);
        localStorage.setItem('educore_user',  JSON.stringify(data.user));

        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } else {
        showError(data.message || 'Login failed. Please try again.');
        btn.classList.remove('loading');
        btn.disabled = false;
      }

    } catch (err) {
      showError('Cannot connect to server. Make sure the backend is running on port 5000.');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // If already logged in, go straight to dashboard
  if (localStorage.getItem('educore_token')) {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
