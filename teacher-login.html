<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCore — Teacher Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c1a0e;
    --surface: #111f13;
    --surface2: #162918;
    --accent: #22c55e;
    --accent2: #16a34a;
    --glow: rgba(34,197,94,0.2);
    --ink: #f0fdf4;
    --ink-soft: #86efac;
    --ink-muted: #4b7a52;
    --border: rgba(34,197,94,0.1);
    --red: #ef4444;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .bg-pattern {
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(34,197,94,0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(22,163,74,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .bg-lines {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(34,197,94,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,197,94,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .login-card {
    width: 100%;
    max-width: 440px;
    padding: 24px;
    position: relative;
    z-index: 10;
    animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .brand {
    display: flex; align-items: center; gap: 12px;
    justify-content: center; margin-bottom: 36px;
  }

  .brand-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 22px;
    box-shadow: 0 0 24px var(--glow);
  }

  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--ink);
  }

  .brand-sub {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent); margin-top: -4px;
  }

  .card-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px; margin-bottom: 6px;
  }

  .card-sub {
    font-size: 13px; color: var(--ink-muted);
    font-weight: 300; margin-bottom: 28px;
  }

  .form-group { margin-bottom: 16px; }

  label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-muted); margin-bottom: 7px;
  }

  .input-wrap { position: relative; }

  .input-icon {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px; color: var(--ink-muted);
    pointer-events: none; transition: color 0.2s;
  }

  .input-wrap:focus-within .input-icon { color: var(--accent); }

  input {
    width: 100%;
    padding: 12px 13px 12px 40px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    font-size: 14px; outline: none;
    transition: all 0.2s;
  }

  input::placeholder { color: var(--ink-muted); }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(34,197,94,0.1);
  }
  input.error { border-color: var(--red); }

  .toggle-pass {
    position: absolute; right: 11px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--ink-muted); font-size: 15px;
  }

  .error-banner {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: var(--radius);
    padding: 11px 14px; font-size: 13px; color: #fca5a5;
    margin-bottom: 16px; display: none; align-items: center; gap: 8px;
  }
  .error-banner.show { display: flex; }

  .btn-login {
    width: 100%; padding: 13px;
    background: var(--accent);
    border: none; border-radius: var(--radius);
    color: #000; font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px var(--glow);
    margin-top: 8px;
  }

  .btn-login:hover { background: #4ade80; transform: translateY(-1px); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .spinner {
    display: none; width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000; border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto;
  }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hint {
    text-align: center; margin-top: 18px;
    font-size: 12px; color: var(--ink-muted);
  }
  .hint strong { color: var(--ink-soft); }
</style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="bg-lines"></div>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">📚</div>
    <div>
      <div class="brand-name">EduCore</div>
      <div class="brand-sub">Teacher Portal</div>
    </div>
  </div>

  <div class="card-inner">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to manage attendance and grades</div>

    <div class="error-banner" id="errorBanner">
      <span>⚠️</span><span id="errorMsg">Invalid credentials.</span>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="text" id="emailInput" placeholder="teacher at educore.com">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="passwordInput" placeholder="Enter your password">
        <button class="toggle-pass" id="toggleBtn" type="button">👁</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" type="button">
      <span class="btn-text">Sign In →</span>
      <div class="spinner"></div>
    </button>

    <div class="hint">
      Default: <strong>teacher at educore.com</strong> / <strong>teacher123</strong>
    </div>
  </div>
</div>

<script>
var API = 'http://localhost:5000/api';

if (localStorage.getItem('educore_teacher_token')) {
  window.location.href = 'teacher.html';
}

document.getElementById('toggleBtn').addEventListener('click', function() {
  var inp = document.getElementById('passwordInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁' : '🙈';
});

document.getElementById('passwordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function clearError() {
  document.getElementById('errorBanner').classList.remove('show');
  document.getElementById('emailInput').classList.remove('error');
  document.getElementById('passwordInput').classList.remove('error');
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBanner').classList.add('show');
  document.getElementById('emailInput').classList.add('error');
  document.getElementById('passwordInput').classList.add('error');
}

document.getElementById('loginBtn').addEventListener('click', doLogin);

function doLogin() {
  var email    = document.getElementById('emailInput').value.trim();
  var password = document.getElementById('passwordInput').value;
  var btn      = document.getElementById('loginBtn');

  if (!email)    { showError('Please enter your email.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  btn.classList.add('loading'); btn.disabled = true;

  fetch(API + '/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ admission_no: email, password: password })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    console.log('Login response:', data);
    if (data.success && data.user && data.user.role === 'teacher') {
      localStorage.setItem('educore_teacher_token', data.token);
      localStorage.setItem('educore_teacher_user', JSON.stringify(data.user));
      window.location.href = 'teacher.html';
    } else if (data.success && data.user.role !== 'teacher') {
      showError('Access denied. Teacher accounts only.');
    } else {
      showError(data.message || 'Login failed.');
    }
  })
  .catch(function(err) {
    showError('Cannot connect to server. Make sure backend is running.');
  })
  .finally(function() {
    btn.classList.remove('loading'); btn.disabled = false;
  });
}
</script>
</body>
</html>
